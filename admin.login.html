<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="config.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #1e1e24; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: none; background: #2a2a35; color: #fff; box-sizing: border-box; }
        .btn { background: linear-gradient(45deg, #bc1888, #f09433); border: none; padding: 15px; width: 100%; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; }
        .spinner { width: 15px; height: 15px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button class="btn" id="login-btn" onclick="login()">Login</button>
</div>

<script>
    async function login() {
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('login-btn');
        btn.innerHTML = '<div class="spinner"></div>';
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'login', pass: pass })
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                localStorage.setItem('adminAuth', 'true');
                window.location.href = 'admin.panel.html';
            } else {
                alert(data.message);
                btn.innerHTML = 'Login';
            }
        } catch(e) {
            alert('Connection Error');
            btn.innerHTML = 'Login';
        }
    }
</script>

</body>
</html>
